manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: g3rtz
      url-base: https://github.com/G3rtz

  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml

    # AW20216S support module for RGB enablement.
    # Use explicit submodule path checkout so drivers/Kconfig is available
    # during Zephyr Kconfig parsing.
    - name: zmk-module-aw20216s
      remote: g3rtz
      revision: main
      submodules:
        - path: drivers

  # Repo-local development manifest.
  self:
    path: .
